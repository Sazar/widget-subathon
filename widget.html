<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subathon Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="widget-wrapper">
    <div class="main-container">

      <!-- ALERT BOX -->
      <div class="alert-box" id="alertBox">
        <div class="alert-type" id="alertType">En attente...</div>
        <div class="alert-name" id="alertName">–</div>
        <!-- encoche circulaire bas-gauche -->
        <div class="alert-notch"></div>
      </div>

      <!-- INFO BOX — cheval haut gauche -->
      <div class="info-box" id="infoBox">
        <div class="info-flip-track">
          <span class="info-slot active" id="infoSlotA"></span>
          <span class="info-slot"       id="infoSlotB"></span>
        </div>
      </div>

      <!-- GOAL BOX — cheval haut droite -->
      <div class="goal-box" id="goalBox">
        <span id="goalCurrent">0</span><span class="goal-sep">/</span><span id="goalTarget">100</span>
        <span class="goal-unit" id="goalUnit">subs</span>
      </div>

      <!-- TIMER BOX — cheval bas droite -->
      <div class="timer-box">
        <div class="timer-display" id="timerDisplay">00:00:00</div>
      </div>

    </div>
  </div>
  <script src="widget.js"></script>
</body>
</html>
