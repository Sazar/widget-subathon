<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subathon Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="widget-wrapper">

    <!-- WIDGET PRINCIPAL -->
    <div class="main-container">

      <!-- ALERT BOX -->
      <div class="alert-box" id="alertBox">
        <div class="alert-type" id="alertType">En attente...</div>
        <!-- Icône X2 — visible uniquement quand le mode X2 est actif -->
        <div class="x2-badge" id="x2Badge">
          <svg viewBox="0 0 36 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Multiplicateur x2 actif">
            <text x="1" y="16" font-family="Rajdhani, sans-serif" font-size="17" font-weight="700" fill="currentColor">x2</text>
            <circle cx="29" cy="10" r="8" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.5"/>
            <path d="M26 13 L32 7 M26 7 L32 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="alert-name" id="alertName">–</div>
      </div>

      <!-- INFO BOX -->
      <div class="info-box" id="infoBox">
        <div class="info-flip-track">
          <span class="info-slot active" id="infoSlotA"></span>
          <span class="info-slot"       id="infoSlotB"></span>
        </div>
      </div>

      <!-- GOAL BOX -->
      <div class="goal-box" id="goalBox">
        <span id="goalCurrent">0</span><span class="goal-sep">/</span><span id="goalTarget">100</span>
        <span class="goal-unit" id="goalUnit">subs</span>
      </div>

      <!-- TIMER BOX -->
      <div class="timer-box">
        <div class="timer-display" id="timerDisplay">--:--:--</div>
      </div>

    </div>

    <!-- BARRES DE GOAL — générées dynamiquement par widget.js -->
    <div class="goal-bars-container" id="goalBarsContainer"></div>

  </div>

  <script src="widget.js"></script>
</body>
</html>
