<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subathon Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="widget-wrapper">

    <!-- WIDGET PRINCIPAL -->
    <div class="main-container">

      <!-- ALERT BOX -->
      <div class="alert-box" id="alertBox">
        <div class="alert-type" id="alertType">En attente...</div>
        <div class="alert-name" id="alertName">–</div>
      </div>

      <!-- INFO BOX -->
      <div class="info-box" id="infoBox">
        <div class="info-flip-track">
          <span class="info-slot active" id="infoSlotA"></span>
          <span class="info-slot"       id="infoSlotB"></span>
        </div>
      </div>

      <!-- GOAL BOX -->
      <div class="goal-box" id="goalBox">
        <span id="goalCurrent">0</span><span class="goal-sep">/</span><span id="goalTarget">100</span>
        <span class="goal-unit" id="goalUnit">subs</span>
      </div>

      <!-- TIMER BOX -->
      <div class="timer-box">
        <div class="timer-display" id="timerDisplay">--:--:--</div>
      </div>

    </div>

    <!-- BARRES DE GOAL -->
    <div class="goal-bars-container" id="goalBarsContainer">

      <div class="goal-bar-wrap" id="gbar1" style="display:none">
        <div class="goal-bar-header">
          <span class="goal-bar-label" id="gbar1-label">Objectif 1</span>
          <span class="goal-bar-count"><span id="gbar1-cur">0</span><span class="goal-bar-sep">/</span><span id="gbar1-tgt">100</span></span>
        </div>
        <div class="goal-bar-track"><div class="goal-bar-fill" id="gbar1-fill"></div></div>
      </div>

      <div class="goal-bar-wrap" id="gbar2" style="display:none">
        <div class="goal-bar-header">
          <span class="goal-bar-label" id="gbar2-label">Objectif 2</span>
          <span class="goal-bar-count"><span id="gbar2-cur">0</span><span class="goal-bar-sep">/</span><span id="gbar2-tgt">100</span></span>
        </div>
        <div class="goal-bar-track"><div class="goal-bar-fill" id="gbar2-fill"></div></div>
      </div>

      <div class="goal-bar-wrap" id="gbar3" style="display:none">
        <div class="goal-bar-header">
          <span class="goal-bar-label" id="gbar3-label">Objectif 3</span>
          <span class="goal-bar-count"><span id="gbar3-cur">0</span><span class="goal-bar-sep">/</span><span id="gbar3-tgt">100</span></span>
        </div>
        <div class="goal-bar-track"><div class="goal-bar-fill" id="gbar3-fill"></div></div>
      </div>

      <div class="goal-bar-wrap" id="gbar4" style="display:none">
        <div class="goal-bar-header">
          <span class="goal-bar-label" id="gbar4-label">Objectif 4</span>
          <span class="goal-bar-count"><span id="gbar4-cur">0</span><span class="goal-bar-sep">/</span><span id="gbar4-tgt">100</span></span>
        </div>
        <div class="goal-bar-track"><div class="goal-bar-fill" id="gbar4-fill"></div></div>
      </div>

      <div class="goal-bar-wrap" id="gbar5" style="display:none">
        <div class="goal-bar-header">
          <span class="goal-bar-label" id="gbar5-label">Objectif 5</span>
          <span class="goal-bar-count"><span id="gbar5-cur">0</span><span class="goal-bar-sep">/</span><span id="gbar5-tgt">100</span></span>
        </div>
        <div class="goal-bar-track"><div class="goal-bar-fill" id="gbar5-fill"></div></div>
      </div>

    </div>

  </div>

  <script src="widget.js"></script>
</body>
</html>
