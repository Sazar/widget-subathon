<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subathon Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SVG clip-path : encoche arc concave bas-gauche de l'alert-box -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <clipPath id="alertBoxClip" clipPathUnits="objectBoundingBox">
        <!--
          Boite 100% x 100% en coordonnees normalisees (0..1)
          Arc concave bas-gauche : rayon ~0.22 (relatif a la largeur)
          On trace : haut-gauche -> haut-droite -> bas-droite
            -> remonte sur le bord bas jusqu'au debut de l'arc
            -> arc Q (bezier quadratique concave) vers le bord gauche
            -> remonte jusqu'en haut-gauche
        -->
        <path d="
          M 0,0
          L 1,0
          L 1,1
          L 0.18,1
          Q 0,1 0,0.78
          L 0,0
          Z
        "/>
      </clipPath>
    </defs>
  </svg>

  <div class="widget-wrapper">
    <div class="main-container">

      <!-- ALERT BOX -->
      <div class="alert-box" id="alertBox">
        <div class="alert-type" id="alertType">En attente...</div>
        <div class="alert-name" id="alertName">–</div>
      </div>

      <!-- INFO BOX — cheval haut gauche -->
      <div class="info-box" id="infoBox">
        <div class="info-flip-track">
          <span class="info-slot active" id="infoSlotA"></span>
          <span class="info-slot"       id="infoSlotB"></span>
        </div>
      </div>

      <!-- GOAL BOX — cheval haut droite -->
      <div class="goal-box" id="goalBox">
        <span id="goalCurrent">0</span><span class="goal-sep">/</span><span id="goalTarget">100</span>
        <span class="goal-unit" id="goalUnit">subs</span>
      </div>

      <!-- TIMER BOX — cheval bas droite -->
      <div class="timer-box">
        <div class="timer-display" id="timerDisplay">00:00:00</div>
      </div>

    </div>
  </div>
  <script src="widget.js"></script>
</body>
</html>
